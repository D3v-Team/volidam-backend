services:
  volidam_postgres:
    image: postgres:16
    container_name: volidam_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - volidam_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "500m"
        max-file: "3"

  volidam:
    build: .
    container_name: volidam_app
    restart: always
    depends_on:
      volidam_postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # .env dagi localhost'ni override qilamiz — Docker ichida service name
      POSTGRES_HOST: volidam_postgres
      POSTGRES_PORT: 5432
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - volidam_uploads:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "500m"
        max-file: "3"

volumes:
  volidam_pg_data:
  volidam_uploads:
